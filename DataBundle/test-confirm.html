<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Confirmation - DEE'S DATA DEALS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <img src="Deelogo.png" alt="Dee's Logo" class="dee-logo">
                </div>
                <div class="header-text">
                    <h1>DEE'S DATA DEALS</h1>
                    <p>Order Confirmation - TEST MODE</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content confirmation-page">
            <section class="form-section full-width">
                <div class="card form-card">
                    <div class="payment-success-banner">
                        <h3>✅ Payment Successful!</h3>
                        <p>Now enter the recipient phone number to complete your order</p>
                    </div>

                    <!-- Order Summary -->
                    <div class="order-summary-section">
                        <h3>Order Summary</h3>
                        <div class="summary-item">
                            <span>Network:</span>
                            <span id="confirm-network">-</span>
                        </div>
                        <div class="summary-item">
                            <span>Bundle:</span>
                            <span id="confirm-bundle">-</span>
                        </div>
                        <div class="summary-item">
                            <span>Amount:</span>
                            <span id="confirm-amount">-</span>
                        </div>
                        <div class="summary-item">
                            <span>Email:</span>
                            <span id="confirm-email">-</span>
                        </div>
                    </div>

                    <!-- Recipient Number Input -->
                    <div class="form-group">
                        <label for="recipient" class="step-label">Recipient Phone Number</label>
                        <input 
                            type="tel" 
                            id="recipient" 
                            class="input-field" 
                            placeholder="Enter phone number to receive data (e.g., 0501234567)"
                            value="0501234567"
                            required
                        >
                    </div>

                    <!-- Submit Button -->
                    <button id="submit-btn" class="btn btn-primary">
                        Submit Order
                    </button>
                    <p class="validation-message hidden" id="validation-msg"></p>
                    <p class="loading-message hidden" id="loading-msg"></p>
                </div>
            </section>
        </main>
    </div>

    <!-- WhatsApp Floating Button -->
    <a href="https://whatsapp.com/channel/0029VbC75Do4Crfr8PhXm41C" target="_blank" class="whatsapp-btn" title="Chat with us on WhatsApp">
        <img src="whatsapp.png" alt="WhatsApp" class="whatsapp-btn-img">
    </a>

    <script>
        // Set up test data
        const paymentData = {
            network: 'MTN',
            bundle: '1GB',
            amount: 5.50,
            email: 'test@example.com'
        };

        const paymentVerified = {
            reference: 'test_ref_123',
            paymentRef: 'DEE_123456',
            timestamp: new Date().toISOString(),
            status: 'confirmed'
        };

        localStorage.setItem('paymentData', JSON.stringify(paymentData));
        localStorage.setItem('paymentVerified', JSON.stringify(paymentVerified));

        console.log('✅ Test data set in localStorage');
    </script>

    <script src="config.js"></script>
    <script src="confirm.js"></script>
</body>
</html>
